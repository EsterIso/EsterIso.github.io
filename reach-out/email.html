<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="email.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <title>Document</title>
</head>
<body>
    <main>
        <div class="contact-section">
            <h1>Contact Me</h1>
            <p>If you have any questions or would like to get in touch, please fill out the form:</p>
        
            <form id="contact-form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="John Doe"><br><br>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="JohnDoe@email.com"><br><br>
                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="4" cols="50" required></textarea><br><br>
                <input type="submit" value="Submit">
            </form>
        </div>
    </main>
    <script src="../load-header.js"></script>
    <script src="email.js"></script>
</body>
</html>
